---
#
# Ansible managed
#

name: Release to Ansible Galaxy

on:
  release:
    types:
      - published
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: galaxy
        uses: robertdebock/galaxy-action@1.2.1
        with:
          git_branch: ${{ github.event.repository.default_branch }}
          galaxy_api_key: ${{ secrets.galaxy_api_key }}
